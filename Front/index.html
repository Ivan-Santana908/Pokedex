<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/pokeball-icon-192.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PokéDex - Una aplicación PWA para explorar, coleccionar y batallar con Pokémon">
    <meta name="theme-color" content="#ef4444">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/pokeball-icon-192.svg">
    <title>PokéDex - Pokedex PWA</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // Registrar Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err))
      }
    </script>
  </body>
</html>
